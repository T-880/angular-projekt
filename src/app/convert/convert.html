<h2>Konvertering</h2>

<h3>Meter till Feet</h3>

<input type="number" [(ngModel)]="meters" placeholder="Ange meter">
<button (click)="convertMeters()">Konvertera</button>

<p>Resultat: {{ feet }} feet</p>

<h3>Feet till Meter</h3>

<input type="number" [(ngModel)]="feetInput" placeholder="Ange feet">
<button (click)="convertFeet()">Konvertera</button>

<p>Resultat: {{ metersResult }} meter</p>

<hr>

<h3>Celsius till Fahrenheit</h3>

<input type="number" [(ngModel)]="celsius" placeholder="Ange celsius">
<button (click)="convertCelsius()">Konvertera</button>

<p>Resultat: {{ fahrenheit }} °F</p>

<h3>Fahrenheit till Celsius</h3>

<input type="number" [(ngModel)]="fahrenheitInput" placeholder="Ange fahrenheit">
<button (click)="convertFahrenheit()">Konvertera</button>

<p>Resultat: {{ celsiusResult }} °C</p>
